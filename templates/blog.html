{% extends 'base.html' %}

{% block content %}
<section class="page-hero">
    <div class="container">
        <h1>Blog</h1>
        <p>Read our latest Erasmus insights, tips, and student advice.</p>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="card-grid">
            {% for post in posts %}
            <article class="card post-card">
                <p class="post-date">{{ post.date }}</p>
                <h3>{{ post.title }}</h3>
                <p>{{ post.summary }}</p>
            </article>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
